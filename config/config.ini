# ── Crawler Toolkit Config ────────────────────
# Default configuration for Web Crawler Toolkit 2026

[general]
# Default threads for parallel operations
threads = 50
# Default crawl depth
depth = 3
# Request timeout (seconds)
timeout = 10
# Rate limit (requests per second)
rate_limit = 150
# User agent
user_agent = Mozilla/5.0 (compatible; CrawlerToolkit/2026; +https://github.com/crawler-toolkit)

[output]
# Output directory
output_dir = /workspace/output
# Log directory
log_dir = /logs
# JSON output enabled
json_output = true
# Verbose logging
verbose = false

[katana]
enabled = true
depth = 3
concurrency = 50
js_crawl = true
xhr_capture = true
form_fill = true
extensions_match = true

[gau]
enabled = true
threads = 30
providers = wayback,commoncrawl,otx,urlscan
blacklist = png,jpg,gif,jpeg,webp,svg,ico,css,woff,woff2,ttf,eot,otf,mp4,mp3,avi

[gospider]
enabled = true
concurrent = 50
depth = 3
js_parsing = true
sitemap = true
robots = true
include_subs = false

[waymore]
enabled = true
mode = U
threads = 50

[xnlinkfinder]
enabled = true
depth = 3
threads = 20

[httpx]
enabled = true
threads = 50
timeout = 10
follow_redirects = true
status_code = true
title = true
content_type = true
web_server = true
tech_detect = true

[nuclei]
enabled = false  # Disabled by default (run separately)
templates = cves,misconfiguration,exposed-panels
severity = critical,high,medium

[scope]
# Add scope patterns (one per line)
# include = *.example.com
# exclude = cdn.example.com

[api_keys]
# Optional API keys for enhanced coverage
# github_token =
# shodan_api_key =
# censys_api_key =
# hunter_api_key =
# virustotal_api_key =
